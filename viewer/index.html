<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASHA Procgen Viewer</title>
    <link rel="stylesheet" href="/viewer/styles.css">
  </head>
  <body>
    <main class="viewer-shell">
      <aside class="summary-panel">
        <h1>ASHA Procgen</h1>
        <section id="batch-list" class="batch-list" aria-label="Generated candidates"></section>
        <div id="summary" class="summary-grid"></div>
        <section id="diagnostics" class="diagnostics" aria-label="Batch diagnostics"></section>
      </aside>
      <section class="layout-panel">
        <div class="view-tabs" aria-label="Preview mode">
          <button class="view-tab" type="button" data-view="layout" data-selected="true">Layout</button>
          <button class="view-tab" type="button" data-view="intermediate" data-selected="false">Intermediate</button>
        </div>
        <svg id="layout" role="img" aria-label="Generated dungeon preview"></svg>
      </section>
    </main>
    <script type="module" src="/viewer/app.js"></script>
  </body>
</html>
